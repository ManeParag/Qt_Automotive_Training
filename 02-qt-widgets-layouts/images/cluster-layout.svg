<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" width="800" height="360" role="img" aria-label="Typical automotive instrument cluster layout: warning lights row, tachometer, speedometer, fuel gauge, status bar">
  <rect width="800" height="360" fill="#0d1117" rx="8"/>

  <!-- Top warning-light strip -->
  <g transform="translate(20,20)">
    <text x="0" y="-4" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Warning indicators (QGridLayout / QHBoxLayout)</text>
    <g>
      <rect x="0" y="0" width="40" height="30" rx="4" fill="none" stroke="#ff3b3b" stroke-width="1.5"/>
      <text x="20" y="19" text-anchor="middle" fill="#ff3b3b" font-family="Arial" font-size="10" font-weight="bold">!</text>
      <rect x="50" y="0" width="40" height="30" rx="4" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
      <text x="70" y="19" text-anchor="middle" fill="#fbbf24" font-family="Arial" font-size="10" font-weight="bold">⚙</text>
      <rect x="100" y="0" width="40" height="30" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="120" y="19" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="10" font-weight="bold">▶</text>
      <rect x="150" y="0" width="40" height="30" rx="4" fill="none" stroke="#10b981" stroke-width="1.5"/>
      <text x="170" y="19" text-anchor="middle" fill="#10b981" font-family="Arial" font-size="10" font-weight="bold">◀</text>
      <rect x="200" y="0" width="40" height="30" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="220" y="19" text-anchor="middle" fill="#3b82f6" font-family="Arial" font-size="10" font-weight="bold">↓</text>
      <rect x="250" y="0" width="40" height="30" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="270" y="19" text-anchor="middle" fill="#3b82f6" font-family="Arial" font-size="10" font-weight="bold">FOG</text>
    </g>
  </g>

  <!-- Main gauges row -->
  <!-- Left column: Fuel + Temp -->
  <g transform="translate(40,80)">
    <text x="0" y="-4" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Custom widgets (QPainter)</text>
    <!-- Fuel -->
    <rect x="0" y="0" width="120" height="100" rx="6" fill="none" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="15" y="50" width="90" height="14" fill="#1f2937"/>
    <rect x="15" y="50" width="65" height="14" fill="#00d4ff"/>
    <text x="60" y="30" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">FUEL</text>
    <text x="60" y="86" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">72%</text>

    <!-- Temp -->
    <rect x="0" y="120" width="120" height="100" rx="6" fill="none" stroke="#1f2937" stroke-width="1.5"/>
    <rect x="15" y="170" width="90" height="14" fill="#1f2937"/>
    <rect x="15" y="170" width="40" height="14" fill="#10b981"/>
    <text x="60" y="150" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">ENG. TEMP</text>
    <text x="60" y="206" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="14" font-weight="bold">88°C</text>
  </g>

  <!-- Center speedometer -->
  <g transform="translate(400,200)">
    <circle cx="0" cy="0" r="110" fill="none" stroke="#1f2937" stroke-width="1"/>
    <path d="M -77.8,77.8 A 110,110 0 1,1 77.8,77.8" fill="none" stroke="#1f2937" stroke-width="8" stroke-linecap="round"/>
    <path d="M -77.8,77.8 A 110,110 0 0,1 0,-110" fill="none" stroke="#00d4ff" stroke-width="8" stroke-linecap="round"/>
    <polygon points="0,-95 -3,0 3,0" fill="#ff3b3b"/>
    <circle cx="0" cy="0" r="10" fill="#ff3b3b"/>
    <circle cx="0" cy="0" r="4" fill="#0d1117"/>
    <text x="0" y="36" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="28" font-weight="bold">120</text>
    <text x="0" y="54" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">km/h</text>
  </g>
  <text x="400" y="100" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Speedometer — custom QWidget</text>

  <!-- Right column: Tachometer -->
  <g transform="translate(640,80)">
    <text x="0" y="-4" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Custom widgets (QPainter)</text>
    <rect x="0" y="0" width="120" height="220" rx="6" fill="none" stroke="#1f2937" stroke-width="1.5"/>
    <g transform="translate(60,90)">
      <circle cx="0" cy="0" r="55" fill="none" stroke="#1f2937" stroke-width="1"/>
      <path d="M -38.9,38.9 A 55,55 0 1,1 38.9,38.9" fill="none" stroke="#1f2937" stroke-width="6" stroke-linecap="round"/>
      <path d="M -38.9,38.9 A 55,55 0 0,1 38.9,-38.9" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"/>
      <path d="M 38.9,-38.9 A 55,55 0 0,1 38.9,38.9" fill="none" stroke="#ff3b3b" stroke-width="6" stroke-linecap="round"/>
      <polygon points="0,-48 -2,0 2,0" fill="#ff3b3b" transform="rotate(45)"/>
      <circle cx="0" cy="0" r="6" fill="#ff3b3b"/>
    </g>
    <text x="60" y="195" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">RPM × 1000</text>
  </g>

  <!-- Bottom status bar -->
  <g transform="translate(20,310)">
    <text x="0" y="-4" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Status row (QHBoxLayout — gear, odometer, drive mode)</text>
    <rect x="0" y="0" width="760" height="40" rx="4" fill="none" stroke="#1f2937" stroke-width="1.5"/>
    <text x="40" y="26" fill="#ffffff" font-family="Arial" font-size="16" font-weight="bold">D</text>
    <text x="80" y="26" fill="#9ca3af" font-family="Arial" font-size="12">Drive</text>
    <line x1="180" y1="8" x2="180" y2="32" stroke="#1f2937"/>
    <text x="220" y="26" fill="#ffffff" font-family="Arial" font-size="13" font-weight="bold">42,317 km</text>
    <text x="320" y="26" fill="#9ca3af" font-family="Arial" font-size="11">Total</text>
    <line x1="420" y1="8" x2="420" y2="32" stroke="#1f2937"/>
    <text x="460" y="26" fill="#9ca3af" font-family="Arial" font-size="11">Mode</text>
    <text x="510" y="26" fill="#00d4ff" font-family="Arial" font-size="13" font-weight="bold">Comfort</text>
    <line x1="620" y1="8" x2="620" y2="32" stroke="#1f2937"/>
    <text x="660" y="26" fill="#ffffff" font-family="Arial" font-size="13">18:42</text>
  </g>
</svg>
