<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" width="1200" height="700">
  <!-- Background -->
  <rect width="1200" height="700" fill="#0a0e14"/>

  <!-- ====================== LEFT: SPEEDOMETER (full height) ====================== -->
  <rect x="20" y="20" width="460" height="660" rx="8" fill="#0f141c" stroke="#1f242c" stroke-width="1"/>
  <text x="40" y="50" fill="#9aa3b3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="3">SPEEDOMETER</text>

  <!-- Speedometer at cx=250, cy=340, r=170 -->
  <circle cx="250" cy="340" r="190" fill="#15191f" stroke="#2a2f38" stroke-width="3"/>
  <circle cx="250" cy="340" r="175" fill="#0a0e14" stroke="#1f242c" stroke-width="1"/>

  <!-- Track arc -->
  <path d="M 129.81 460.19 A 170 170 0 1 1 370.19 460.19"
        fill="none" stroke="#1f2630" stroke-width="12" stroke-linecap="round"/>

  <!-- Progress arc (0 to 80 km/h = 90°) -->
  <path d="M 129.81 460.19 A 170 170 0 0 1 129.81 219.81"
        fill="none" stroke="#00d4ff" stroke-width="12" stroke-linecap="round"/>

  <!-- Red zone arc -->
  <path d="M 420 340 A 170 170 0 0 1 370.19 460.19"
        fill="none" stroke="#ff3344" stroke-width="12" stroke-linecap="round"/>

  <!-- Major ticks -->
  <g stroke="#8a96a8" stroke-width="2" stroke-linecap="round">
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(-135 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(-112.5 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(-90 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(-67.5 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(-45 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(-22.5 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(0 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(22.5 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(45 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(67.5 250 340)"/>
  </g>
  <g stroke="#ff5566" stroke-width="2" stroke-linecap="round">
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(90 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(112.5 250 340)"/>
    <line x1="250" y1="150" x2="250" y2="167" transform="rotate(135 250 340)"/>
  </g>

  <!-- Numeric labels -->
  <g fill="#c8d2e0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500" text-anchor="middle">
    <text x="142" y="446">0</text>
    <text x="113" y="343">40</text>
    <text x="142" y="240">80</text>
    <text x="250" y="206">120</text>
    <text x="358" y="240">160</text>
  </g>
  <g fill="#ff7788" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="500" text-anchor="middle">
    <text x="387" y="343">200</text>
    <text x="358" y="446">240</text>
  </g>

  <!-- Needle at 80 km/h -->
  <g transform="rotate(-45 250 340)">
    <polygon points="250,180 245,340 255,340" fill="#ff3344" opacity="0.4" transform="translate(2,2)"/>
    <polygon points="250,180 245,340 255,340" fill="#ff3344"/>
    <polygon points="245,340 255,340 252,360 248,360" fill="#aa2030"/>
  </g>

  <!-- Centre hub -->
  <circle cx="250" cy="340" r="20" fill="#15191f" stroke="#00d4ff" stroke-width="2"/>
  <circle cx="250" cy="340" r="7" fill="#00d4ff"/>

  <!-- Digital readout -->
  <text x="250" y="600" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700" text-anchor="middle" letter-spacing="2">80</text>
  <text x="250" y="635" fill="#8a96a8" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="4">KM/H</text>

  <!-- ====================== TOP-MIDDLE: CAR INFO ====================== -->
  <rect x="500" y="20" width="220" height="200" rx="8" fill="#0f141c" stroke="#1f242c" stroke-width="1"/>
  <text x="520" y="48" fill="#9aa3b3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="3">CAR INFO</text>

  <!-- 4 stat rows -->
  <text x="520" y="78" fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="2">SPEED</text>
  <text x="700" y="78" fill="#00d4ff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="end">80 km/h</text>
  <line x1="520" y1="88" x2="700" y2="88" stroke="#1f242c" stroke-width="1"/>

  <text x="520" y="113" fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="2">RPM</text>
  <text x="700" y="113" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="end">2400</text>
  <line x1="520" y1="123" x2="700" y2="123" stroke="#1f242c" stroke-width="1"/>

  <text x="520" y="148" fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="2">GEAR</text>
  <text x="700" y="148" fill="#00d488" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="end">D</text>
  <line x1="520" y1="158" x2="700" y2="158" stroke="#1f242c" stroke-width="1"/>

  <text x="520" y="183" fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="500" letter-spacing="2">RANGE</text>
  <text x="700" y="183" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" text-anchor="end">380 km</text>

  <!-- ====================== TOP-RIGHT: LINE CHART ====================== -->
  <rect x="740" y="20" width="440" height="200" rx="8" fill="#0f141c" stroke="#1f242c" stroke-width="1"/>
  <text x="760" y="48" fill="#9aa3b3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="3">SPEED · LINE CHART</text>
  <text x="1160" y="48" fill="#00d4ff" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="end">80 km/h</text>

  <!-- Y axis labels -->
  <g fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="end">
    <text x="785" y="78">200</text>
    <text x="785" y="115">100</text>
    <text x="785" y="187">0</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#1f242c" stroke-width="1" stroke-dasharray="2,3">
    <line x1="795" y1="75" x2="1160" y2="75"/>
    <line x1="795" y1="112" x2="1160" y2="112"/>
    <line x1="795" y1="149" x2="1160" y2="149"/>
  </g>
  <line x1="795" y1="186" x2="1160" y2="186" stroke="#3a4456" stroke-width="1"/>
  <line x1="795" y1="75" x2="795" y2="186" stroke="#3a4456" stroke-width="1"/>

  <!-- Area fill -->
  <path d="M 795,160 L 830,153 L 865,143 L 900,135 L 935,130 L 970,125 L 1005,128 L 1040,135 L 1075,140 L 1110,143 L 1155,140 L 1155,186 L 795,186 Z"
        fill="#00d4ff" opacity="0.12"/>
  <!-- Line -->
  <polyline points="795,160 830,153 865,143 900,135 935,130 970,125 1005,128 1040,135 1075,140 1110,143 1155,140"
            fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>
  <!-- Now marker -->
  <circle cx="1155" cy="140" r="4" fill="#00d4ff"/>
  <circle cx="1155" cy="140" r="7" fill="#00d4ff" opacity="0.3"/>

  <text x="977" y="208" fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="9" text-anchor="middle">last 30 seconds</text>

  <!-- ====================== FUEL PROGRESS BAR ====================== -->
  <rect x="500" y="240" width="680" height="60" rx="8" fill="#0f141c" stroke="#1f242c" stroke-width="1"/>
  <text x="520" y="265" fill="#c8d2e0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="2">FUEL LEVEL</text>
  <text x="1160" y="265" fill="#00d488" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="end">62%</text>
  <!-- Bar track -->
  <rect x="520" y="275" width="640" height="14" rx="4" fill="#15191f" stroke="#2a2f38" stroke-width="1"/>
  <!-- Bar fill -->
  <rect x="522" y="277" width="394" height="10" rx="2" fill="#00d488"/>

  <!-- ====================== BATTERY PROGRESS BAR ====================== -->
  <rect x="500" y="320" width="680" height="60" rx="8" fill="#0f141c" stroke="#1f242c" stroke-width="1"/>
  <text x="520" y="345" fill="#c8d2e0" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="2">BATTERY</text>
  <text x="1160" y="345" fill="#00d488" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" text-anchor="end">85%</text>
  <rect x="520" y="355" width="640" height="14" rx="4" fill="#15191f" stroke="#2a2f38" stroke-width="1"/>
  <rect x="522" y="357" width="540" height="10" rx="2" fill="#00d488"/>

  <!-- ====================== BAR CHART (bottom) ====================== -->
  <rect x="500" y="400" width="680" height="280" rx="8" fill="#0f141c" stroke="#1f242c" stroke-width="1"/>
  <text x="520" y="428" fill="#9aa3b3" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="3">LEVELS · BAR CHART</text>

  <!-- Y axis labels -->
  <g fill="#5a6478" font-family="Arial, Helvetica, sans-serif" font-size="10" text-anchor="end">
    <text x="555" y="458">100</text>
    <text x="555" y="498">75</text>
    <text x="555" y="538">50</text>
    <text x="555" y="578">25</text>
    <text x="555" y="618">0%</text>
  </g>

  <!-- Grid lines -->
  <g stroke="#1f242c" stroke-width="1" stroke-dasharray="2,3">
    <line x1="565" y1="455" x2="1160" y2="455"/>
    <line x1="565" y1="495" x2="1160" y2="495"/>
    <line x1="565" y1="535" x2="1160" y2="535"/>
    <line x1="565" y1="575" x2="1160" y2="575"/>
  </g>
  <line x1="565" y1="615" x2="1160" y2="615" stroke="#3a4456" stroke-width="1"/>
  <line x1="565" y1="455" x2="565" y2="615" stroke="#3a4456" stroke-width="1"/>

  <!-- Bars -->
  <!-- Coolant 73% -->
  <rect x="660" y="498" width="100" height="117" fill="#ffaa33" rx="3"/>
  <text x="710" y="489" fill="#ffaa33" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">73%</text>
  <text x="710" y="638" fill="#c8d2e0" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">COOLANT</text>

  <!-- Oil 18% (critical) -->
  <rect x="810" y="586" width="100" height="29" fill="#ff3344" rx="3"/>
  <text x="860" y="577" fill="#ff3344" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">18%</text>
  <text x="860" y="638" fill="#ff3344" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">OIL ⚠</text>

  <!-- Washer 64% -->
  <rect x="960" y="513" width="100" height="102" fill="#00d488" rx="3"/>
  <text x="1010" y="504" fill="#00d488" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" text-anchor="middle">64%</text>
  <text x="1010" y="638" fill="#c8d2e0" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="1">WASHER</text>
</svg>
