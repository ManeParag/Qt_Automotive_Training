<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="Sample QtCharts line chart showing speed over time during a 60-minute trip">
  <rect width="760" height="320" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="380" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Speed over time — last trip</text>

  <!-- Chart frame -->
  <g transform="translate(70,55)">
    <!-- Plot area background -->
    <rect width="640" height="200" fill="none" stroke="#1f2937" stroke-width="1"/>

    <!-- Grid lines (horizontal, faint) -->
    <line x1="0" y1="40"  x2="640" y2="40"  stroke="#1f2937" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="0" y1="80"  x2="640" y2="80"  stroke="#1f2937" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="0" y1="120" x2="640" y2="120" stroke="#1f2937" stroke-width="1" stroke-dasharray="2,4"/>
    <line x1="0" y1="160" x2="640" y2="160" stroke="#1f2937" stroke-width="1" stroke-dasharray="2,4"/>

    <!-- Y-axis labels -->
    <text x="-10" y="204" text-anchor="end" fill="#9ca3af" font-family="Arial" font-size="11">0</text>
    <text x="-10" y="164" text-anchor="end" fill="#9ca3af" font-family="Arial" font-size="11">40</text>
    <text x="-10" y="124" text-anchor="end" fill="#9ca3af" font-family="Arial" font-size="11">80</text>
    <text x="-10" y="84"  text-anchor="end" fill="#9ca3af" font-family="Arial" font-size="11">120</text>
    <text x="-10" y="44"  text-anchor="end" fill="#9ca3af" font-family="Arial" font-size="11">160</text>
    <text x="-10" y="4"   text-anchor="end" fill="#9ca3af" font-family="Arial" font-size="11">200</text>

    <!-- Y-axis label -->
    <text x="-50" y="100" transform="rotate(-90 -50 100)" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">km/h</text>

    <!-- X-axis labels -->
    <text x="0"   y="222" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">0</text>
    <text x="128" y="222" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">12</text>
    <text x="256" y="222" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">24</text>
    <text x="384" y="222" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">36</text>
    <text x="512" y="222" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">48</text>
    <text x="640" y="222" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">60</text>
    <text x="320" y="244" text-anchor="middle" fill="#9ca3af" font-family="Arial" font-size="11">minutes</text>

    <!-- Area fill under line (subtle) -->
    <path d="M 0,180 L 30,170 L 60,150 L 95,130 L 130,105 L 170,90 L 210,75 L 260,60
             L 310,55 L 360,70 L 410,80 L 450,95 L 490,110 L 530,125 L 570,140 L 600,160
             L 640,170 L 640,200 L 0,200 Z"
          fill="#00d4ff" fill-opacity="0.12"/>

    <!-- Line chart path -->
    <path d="M 0,180 L 30,170 L 60,150 L 95,130 L 130,105 L 170,90 L 210,75 L 260,60
             L 310,55 L 360,70 L 410,80 L 450,95 L 490,110 L 530,125 L 570,140 L 600,160
             L 640,170"
          fill="none" stroke="#00d4ff" stroke-width="2" stroke-linejoin="round"/>

    <!-- Data point markers -->
    <g fill="#00d4ff">
      <circle cx="0"   cy="180" r="3"/>
      <circle cx="130" cy="105" r="3"/>
      <circle cx="260" cy="60"  r="3"/>
      <circle cx="310" cy="55"  r="3"/>
      <circle cx="450" cy="95"  r="3"/>
      <circle cx="640" cy="170" r="3"/>
    </g>

    <!-- Peak callout -->
    <line x1="310" y1="55" x2="310" y2="30" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="310" y="20" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="10">145 km/h peak</text>
  </g>

  <!-- Legend footer -->
  <g transform="translate(70,295)">
    <rect x="0" y="-8" width="14" height="3" fill="#00d4ff"/>
    <text x="22" y="-3" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">Speed (QLineSeries)</text>
    <text x="640" y="-3" text-anchor="end" fill="#6b7280" font-family="Arial, sans-serif" font-size="10">Chart::ChartThemeDark</text>
  </g>
</svg>
