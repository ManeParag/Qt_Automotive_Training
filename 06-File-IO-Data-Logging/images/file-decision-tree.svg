<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" role="img" aria-label="Decision tree showing which Qt class to use for each kind of file data">
  <rect width="800" height="420" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="16" font-weight="bold">Which Qt class for which data?</text>

  <!-- Root decision -->
  <g>
    <rect x="320" y="60" width="160" height="50" rx="6" fill="#1f2937" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="400" y="82" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="bold">What kind of data?</text>
    <text x="400" y="100" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">(volume · structure · who edits)</text>
  </g>

  <!-- Branch lines from root -->
  <line x1="400" y1="110" x2="120" y2="170" stroke="#374151" stroke-width="1.5"/>
  <line x1="400" y1="110" x2="305" y2="170" stroke="#374151" stroke-width="1.5"/>
  <line x1="400" y1="110" x2="495" y2="170" stroke="#374151" stroke-width="1.5"/>
  <line x1="400" y1="110" x2="680" y2="170" stroke="#374151" stroke-width="1.5"/>

  <!-- Option 1: Trip log (many rows over time) -->
  <g transform="translate(20,170)">
    <rect width="200" height="80" rx="6" fill="#0d1117" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="100" y="22" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Many rows over time</text>
    <text x="100" y="42" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">trip log · CAN frames ·</text>
    <text x="100" y="56" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">sensor recordings</text>
    <text x="100" y="74" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="9">e.g. 20 Hz speed samples</text>

    <line x1="100" y1="80" x2="100" y2="110" stroke="#374151" stroke-width="1.5"/>
    <polygon points="100,110 96,104 104,104" fill="#374151"/>

    <rect x="0" y="110" width="200" height="60" rx="6" fill="#1f2937" stroke="#3b82f6" stroke-width="2"/>
    <text x="100" y="135" text-anchor="middle" fill="#3b82f6" font-family="Arial, sans-serif" font-size="13" font-weight="bold">QFile + QTextStream</text>
    <text x="100" y="155" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">→ CSV file</text>
  </g>

  <!-- Option 2: User preference (key/value) -->
  <g transform="translate(230,170)">
    <rect width="170" height="80" rx="6" fill="#0d1117" stroke="#10b981" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="12" font-weight="bold">User preference</text>
    <text x="85" y="42" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">brightness · units · drive</text>
    <text x="85" y="56" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">mode · last station</text>
    <text x="85" y="74" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="9">simple key → value</text>

    <line x1="85" y1="80" x2="85" y2="110" stroke="#374151" stroke-width="1.5"/>
    <polygon points="85,110 81,104 89,104" fill="#374151"/>

    <rect x="0" y="110" width="170" height="60" rx="6" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="85" y="135" text-anchor="middle" fill="#10b981" font-family="Arial, sans-serif" font-size="13" font-weight="bold">QSettings</text>
    <text x="85" y="155" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">→ INI / registry</text>
  </g>

  <!-- Option 3: Structured config -->
  <g transform="translate(410,170)">
    <rect width="170" height="80" rx="6" fill="#0d1117" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="85" y="22" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Structured config</text>
    <text x="85" y="42" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">vehicle limits · theme</text>
    <text x="85" y="56" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">arrays of drive modes</text>
    <text x="85" y="74" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="9">nested · human-readable</text>

    <line x1="85" y1="80" x2="85" y2="110" stroke="#374151" stroke-width="1.5"/>
    <polygon points="85,110 81,104 89,104" fill="#374151"/>

    <rect x="0" y="110" width="170" height="60" rx="6" fill="#1f2937" stroke="#fbbf24" stroke-width="2"/>
    <text x="85" y="135" text-anchor="middle" fill="#fbbf24" font-family="Arial, sans-serif" font-size="13" font-weight="bold">QJsonDocument</text>
    <text x="85" y="155" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">→ JSON file</text>
  </g>

  <!-- Option 4: Read-only asset -->
  <g transform="translate(590,170)">
    <rect width="190" height="80" rx="6" fill="#0d1117" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="95" y="22" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Ships with the binary</text>
    <text x="95" y="42" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">icons · QSS themes ·</text>
    <text x="95" y="56" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="10">default config</text>
    <text x="95" y="74" text-anchor="middle" fill="#6b7280" font-family="Arial, sans-serif" font-size="9">never edited at runtime</text>

    <line x1="95" y1="80" x2="95" y2="110" stroke="#374151" stroke-width="1.5"/>
    <polygon points="95,110 91,104 99,104" fill="#374151"/>

    <rect x="0" y="110" width="190" height="60" rx="6" fill="#1f2937" stroke="#a78bfa" stroke-width="2"/>
    <text x="95" y="135" text-anchor="middle" fill="#a78bfa" font-family="Arial, sans-serif" font-size="13" font-weight="bold">QFile + .qrc resource</text>
    <text x="95" y="155" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11">→ :/path embedded</text>
  </g>

  <!-- Where it lives (footer hint) -->
  <g transform="translate(20,360)">
    <rect width="760" height="44" rx="6" fill="none" stroke="#1f2937" stroke-width="1"/>
    <text x="20" y="20" fill="#9ca3af" font-family="Arial, sans-serif" font-size="11" font-weight="bold">Where to put the file:</text>
    <text x="20" y="36" fill="#6b7280" font-family="Arial, sans-serif" font-size="11">Writable data → QStandardPaths::AppDataLocation · Read-only assets → :/qrc · Temp scratch → QStandardPaths::TempLocation</text>
  </g>
</svg>
