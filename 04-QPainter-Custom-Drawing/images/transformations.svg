<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" width="720" height="220" role="img" aria-label="Three panels showing translate, rotate and scale transformations">
  <rect width="720" height="220" fill="#0d1117" rx="8"/>

  <!-- Panel 1: translate -->
  <g transform="translate(20,20)">
    <rect width="220" height="180" fill="none" stroke="#1f2937" stroke-width="1" rx="4"/>
    <text x="110" y="20" text-anchor="middle" fill="#00d4ff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">translate(dx, dy)</text>

    <!-- old axes (faint) -->
    <line x1="30" y1="60" x2="30" y2="160" stroke="#374151" stroke-width="1"/>
    <line x1="30" y1="160" x2="130" y2="160" stroke="#374151" stroke-width="1"/>
    <text x="20" y="170" fill="#6b7280" font-size="10" font-family="Arial">orig.</text>

    <!-- arrow from old to new origin -->
    <line x1="34" y1="156" x2="98" y2="98" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <polygon points="98,98 92,98 98,104" fill="#fbbf24"/>

    <!-- new axes (bright) -->
    <line x1="100" y1="40" x2="100" y2="140" stroke="#00d4ff" stroke-width="2"/>
    <line x1="100" y1="100" x2="200" y2="100" stroke="#00d4ff" stroke-width="2"/>
    <circle cx="100" cy="100" r="3" fill="#00d4ff"/>
    <text x="105" y="135" fill="#9ca3af" font-size="10" font-family="Arial">new origin</text>
  </g>

  <!-- Panel 2: rotate -->
  <g transform="translate(260,20)">
    <rect width="220" height="180" fill="none" stroke="#1f2937" stroke-width="1" rx="4"/>
    <text x="110" y="20" text-anchor="middle" fill="#00d4ff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">rotate(angle)</text>

    <!-- center -->
    <circle cx="110" cy="105" r="3" fill="#9ca3af"/>

    <!-- needle at 0° (faint) -->
    <polygon points="110,40 107,105 113,105" fill="#374151"/>

    <!-- needle rotated 45° (bright) -->
    <g transform="rotate(45 110 105)">
      <polygon points="110,40 107,105 113,105" fill="#ff3b3b"/>
    </g>

    <!-- arc showing rotation -->
    <path d="M 110,55 A 50,50 0 0,1 145,75" fill="none" stroke="#fbbf24" stroke-width="1.5"/>
    <polygon points="145,75 138,72 143,80" fill="#fbbf24"/>
    <text x="150" y="68" fill="#fbbf24" font-size="11" font-family="Arial">45°</text>
  </g>

  <!-- Panel 3: scale -->
  <g transform="translate(500,20)">
    <rect width="200" height="180" fill="none" stroke="#1f2937" stroke-width="1" rx="4"/>
    <text x="100" y="20" text-anchor="middle" fill="#00d4ff" font-family="Arial, sans-serif" font-size="14" font-weight="bold">scale(sx, sy)</text>

    <!-- small shape (original) -->
    <rect x="50" y="80" width="40" height="40" fill="none" stroke="#374151" stroke-width="2"/>
    <text x="70" y="135" text-anchor="middle" fill="#6b7280" font-size="10" font-family="Arial">1×</text>

    <!-- arrow -->
    <line x1="95" y1="100" x2="115" y2="100" stroke="#fbbf24" stroke-width="1.5"/>
    <polygon points="115,100 110,97 110,103" fill="#fbbf24"/>

    <!-- bigger shape -->
    <rect x="120" y="60" width="60" height="80" fill="none" stroke="#00d4ff" stroke-width="2"/>
    <text x="150" y="155" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="Arial">1.5× × 2×</text>
  </g>
</svg>
